services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: omphalos
      POSTGRES_USER: ${POSTGRES_USER:-omphalos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-omphalos} -d omphalos"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    image: ghcr.io/jasonjamesk/omphalos:latest
    restart: unless-stopped
    ports:
      - "${API_PORT:-8080}:8080"
    environment:
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: >-
        Host=postgres;
        Database=omphalos;
        Username=${POSTGRES_USER:-omphalos};
        Password=${POSTGRES_PASSWORD}
      Jwt__Secret: ${JWT_SECRET:?JWT_SECRET is required}
      Jwt__Issuer: omphalos
      Jwt__Audience: omphalos
      Admin__Username: ${ADMIN_USERNAME:?ADMIN_USERNAME is required}
      Admin__Password: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      AllowedOrigins__0: ${ALLOWED_ORIGIN:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
